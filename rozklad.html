<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>⚡ Щоденник тренувань</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Barlow Condensed',Arial,sans-serif;background:#0d0d14;color:#f0f0f0;min-height:100vh}
  input,textarea,button{font-family:inherit}
  input[type=number]{-moz-appearance:textfield}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#333}

  .app{max-width:480px;margin:0 auto;padding-bottom:40px}
  .topnav{background:#13131e;border-bottom:1px solid #1e1e2e;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .topnav-title{font-weight:800;font-size:18px;letter-spacing:1px}
  .topnav-btns{display:flex;gap:6px}
  .nav-btn{background:#1e1e2e;border:1px solid #2a2a3e;color:#aaa;border-radius:6px;padding:5px 12px;font-size:12px;letter-spacing:1px;cursor:pointer;transition:all .15s}
  .nav-btn:hover{filter:brightness(1.2)}
  .back-btn{background:#1e1e2e;border:1px solid #2a2a3e;color:#aaa;border-radius:6px;padding:4px 10px;font-size:18px;cursor:pointer;transition:all .15s;display:none}
  .page{padding:16px;display:none;animation:fadeIn .2s ease}
  .page.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  /* STAT CARDS */
  .stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px}
  .stat-card{background:#1a1a26;border-radius:10px;padding:12px 8px;text-align:center;border-top:3px solid var(--c)}
  .stat-label{font-size:10px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
  .stat-val{font-size:20px;font-weight:800;color:var(--c)}
  .stat-unit{font-size:11px;color:#888;margin-left:2px}

  /* DAY CARDS */
  .section-label{font-size:11px;letter-spacing:3px;color:#555;text-transform:uppercase;margin-bottom:10px}
  .day-card{background:#13131e;border:1px solid var(--c,#333);border-left:4px solid var(--c,#333);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s}
  .day-card:hover{transform:translateY(-2px);filter:brightness(1.1)}
  .day-badge{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;margin-right:12px}
  .day-info{flex:1}
  .day-name{font-weight:700;font-size:15px}
  .day-last{font-size:11px;color:#666;margin-top:2px}
  .day-arrow{font-size:20px}

  /* WEIGHT TRACKER */
  .weight-box{background:#13131e;border:1px solid #1e1e2e;border-radius:10px;padding:14px;margin-top:20px}
  .weight-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .weight-input{background:#1e1e2e;border:1px solid #2e2e3e;color:#fff;border-radius:6px;padding:8px 0;font-size:22px;font-weight:800;width:90px;text-align:center}
  .weight-unit{color:#888;font-size:14px}
  .weight-status{flex:1;text-align:right;font-size:12px;font-weight:700}
  .progress-bar-bg{background:#1e1e2e;border-radius:4px;height:6px;overflow:hidden}
  .progress-bar-fill{height:100%;border-radius:4px;transition:width .4s ease}
  .progress-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:#555}

  /* LOG PAGE */
  .ex-block{background:#13131e;border:1px solid #1e1e2e;border-radius:10px;margin-bottom:10px;overflow:hidden}
  .ex-header{padding:8px 14px;border-bottom:1px solid #1e1e2e;display:flex;align-items:center;gap:8px}
  .ex-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
  .ex-title{font-weight:700;font-size:14px}
  .sets-area{padding:8px 14px}
  .sets-head{display:grid;grid-template-columns:40px 1fr 1fr 44px;gap:6px;margin-bottom:6px;font-size:10px;color:#666;letter-spacing:1px;text-transform:uppercase}
  .set-row{display:grid;grid-template-columns:40px 1fr 1fr 44px;gap:6px;margin-bottom:6px;align-items:center}
  .set-num{width:28px;height:28px;border-radius:6px;background:#1e1e2e;display:flex;align-items:center;justify-content:center;font-size:12px;color:#888;font-weight:700}
  .set-input{background:#1e1e2e;border:1px solid #2e2e3e;color:#fff;border-radius:6px;padding:6px 0;font-size:16px;font-weight:700;width:100%;text-align:center}
  .set-input.done{border-color:var(--dc,#555)}
  .set-done-btn{width:36px;height:36px;border-radius:8px;background:#1e1e2e;border:2px solid #2e2e3e;color:#555;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .set-done-btn.active{color:#fff;background:var(--dc);border-color:var(--dc)}
  .set-row.completed{opacity:.5}

  .extra-box{background:#13131e;border:1px solid #1e1e2e;border-radius:10px;padding:14px;margin-bottom:10px}
  .extra-label{font-size:11px;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .cardio-input{background:#1e1e2e;border:1px solid #2e2e3e;color:#fff;border-radius:6px;padding:8px 12px;font-size:22px;font-weight:800;width:100px;text-align:center}
  .notes-input{background:#1e1e2e;border:1px solid #2e2e3e;color:#fff;border-radius:6px;padding:8px 12px;font-size:13px;width:100%;min-height:70px;resize:vertical;font-family:'Barlow',sans-serif;line-height:1.5}
  .save-btn{width:100%;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:800;letter-spacing:2px;cursor:pointer;transition:all .15s;margin-top:4px}
  .save-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
  .save-btn:active{transform:none}

  /* SAVED SCREEN */
  .saved-screen{text-align:center;padding:60px 0}
  .saved-icon{font-size:64px}
  .saved-title{font-size:24px;font-weight:800;margin-top:12px}
  .saved-sub{color:#888;margin-top:6px;font-family:'Barlow',sans-serif}

  /* HISTORY */
  .hist-card{background:#13131e;border-radius:10px;margin-bottom:8px;overflow:hidden;border:1px solid #1e1e2e;border-left:4px solid var(--hc,#555)}
  .hist-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .hist-name{font-weight:700;font-size:14px}
  .hist-meta{font-size:11px;color:#666;margin-top:2px}
  .hist-vol{font-size:13px;font-weight:700;text-align:right}
  .hist-arrow{color:#555;font-size:14px;margin-top:2px}
  .hist-body{padding:0 14px 12px;border-top:1px solid #1e1e2e;display:none}
  .hist-body.open{display:block}
  .hist-ex-name{font-size:12px;color:#888;font-weight:700;margin:10px 0 4px}
  .hist-sets{display:flex;flex-wrap:wrap;gap:4px}
  .hist-set-badge{border-radius:4px;padding:3px 8px;font-size:12px;border:1px solid}
  .hist-notes{margin-top:10px;color:#888;font-size:12px;font-style:italic;border-top:1px solid #1e1e2e;padding-top:8px;font-family:'Barlow',sans-serif}
  .del-btn{margin-top:10px;background:transparent;border:1px solid #e74c3c33;color:#e74c3c55;border-radius:6px;padding:4px 12px;font-size:11px;cursor:pointer}
  .empty-state{text-align:center;padding:60px 0;color:#555}
  .empty-icon{font-size:48px}
  .empty-text{margin-top:12px;font-family:'Barlow',sans-serif;font-size:14px;line-height:1.6}

  /* STATS PAGE */
  .stats2-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
  .pr-row{display:flex;justify-content:space-between;border-bottom:1px solid #1e1e2e;padding:7px 0;align-items:center}
  .pr-name{font-size:12px;color:#ccc}
  .pr-badge{background:#f39c1222;border:1px solid #f39c1255;color:#f39c12;border-radius:4px;padding:2px 8px;font-size:11px;font-weight:700;letter-spacing:1px}
</style>
</head>
<body>
<div class="app">
  <!-- TOP NAV -->
  <div class="topnav">
    <div style="display:flex;align-items:center;gap:8px">
      <button class="back-btn" id="backBtn" onclick="goHome()">←</button>
      <span class="topnav-title" id="navTitle">⚡ ЩОДЕННИК</span>
    </div>
    <div class="topnav-btns" id="navBtns">
      <button class="nav-btn" onclick="showPage('history')">ЖУРНАЛ</button>
      <button class="nav-btn" onclick="showPage('stats')">ПРОГРЕС</button>
    </div>
  </div>

  <!-- HOME PAGE -->
  <div class="page active" id="page-home">
    <div class="stats-row" id="homeStats"></div>
    <div class="section-label">Вибери день тренування</div>
    <div id="dayList"></div>
    <div class="weight-box">
      <div class="section-label">Моя вага сьогодні</div>
      <div class="weight-row">
        <input type="number" class="weight-input" id="weightInput" step="0.1" oninput="updateWeight(this.value)">
        <span class="weight-unit">кг</span>
        <div class="weight-status" id="weightStatus"></div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="weightBar"></div></div>
      <div class="progress-labels"><span>Старт: 86 кг</span><span>Мета: 80 кг</span></div>
    </div>
  </div>

  <!-- LOG PAGE -->
  <div class="page" id="page-log">
    <div id="logContent"></div>
  </div>

  <!-- HISTORY PAGE -->
  <div class="page" id="page-history">
    <div id="histContent"></div>
  </div>

  <!-- STATS PAGE -->
  <div class="page" id="page-stats">
    <div id="statsContent"></div>
  </div>
</div>

<script>
// ── PLAN ──
const PLAN = [
  {id:1,label:"Д1",focus:"Груди + Трицепс",color:"#e74c3c",
   exercises:[
    {name:"Тренажер жим груди",dw:0},{name:"Жим гантелей (плоска лава)",dw:12},
    {name:"Розведення гантелей 30°",dw:8},{name:"Тренажер трицепс",dw:0},
    {name:"Французький жим з гантеллю",dw:8}]},
  {id:2,label:"Д2",focus:"Спина + Біцепс",color:"#2980b9",
   exercises:[
    {name:"Тренажер тяга (спина)",dw:0},{name:"Тяга гантелі в нахилі",dw:15},
    {name:"Тяга двох гантелей у нахилі",dw:12},{name:"Згин рук стоячи",dw:10},
    {name:"Молоткові згини",dw:10}]},
  {id:3,label:"Д3",focus:"Плечі + Прес",color:"#f39c12",
   exercises:[
    {name:"Тренажер бокова дельта",dw:0},{name:"Жим гантелей над головою",dw:12},
    {name:"Підйом гантелей перед собою",dw:8},{name:"Тяга задня дельта",dw:8},
    {name:"Тренажер прес",dw:0},{name:"Підйом ніг на лаві",dw:0}]},
  {id:4,label:"Д4",focus:"Груди + Спина",color:"#8e44ad",
   exercises:[
    {name:"Суперсет: жим груди",dw:0},{name:"Суперсет: тяга спини",dw:0},
    {name:"Жим на похилій лаві 30°",dw:12},{name:"Пуловер з гантеллю",dw:12}]},
  {id:5,label:"Д5",focus:"Руки + Прес",color:"#27ae60",
   exercises:[
    {name:"Тренажер трицепс",dw:0},{name:"Kickback з гантеллю",dw:8},
    {name:"Згин рук сидячи",dw:10},{name:"Концентровані згини",dw:10},
    {name:"Тренажер прес",dw:0},{name:"Бокові нахили з гантеллю",dw:12}]},
  {id:6,label:"Д6",focus:"Кардіо + Все тіло",color:"#16a085",
   exercises:[
    {name:"Тренажер жим груди (легко)",dw:0},{name:"Тренажер спина (легко)",dw:0},
    {name:"Тренажер дельта (легко)",dw:0},{name:"Тренажер трицепс (легко)",dw:0},
    {name:"Тренажер прес",dw:0}]},
];

// ── DATA ──
function load(){
  try{ return JSON.parse(localStorage.getItem('wj2') || '{"logs":[],"bw":86}'); }
  catch{ return {logs:[],bw:86}; }
}
function save(d){ localStorage.setItem('wj2', JSON.stringify(d)); }
let DB = load();

// ── HELPERS ──
const fmt = d => new Date(d).toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'2-digit'});
const hex2rgba = (hex,a) => `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;

// ── NAVIGATION ──
let currentPage = 'home';
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('backBtn').style.display = name==='home'?'none':'block';
  document.getElementById('navBtns').style.display = name==='home'?'flex':'none';
  currentPage = name;
  const titles = {home:'⚡ ЩОДЕННИК',log:'💪 ТРЕНУВАННЯ',history:'📋 ЖУРНАЛ',stats:'📊 ПРОГРЕС'};
  document.getElementById('navTitle').textContent = titles[name]||'';
  if(name==='home') renderHome();
  if(name==='history') renderHistory();
  if(name==='stats') renderStats();
}
function goHome(){ showPage('home'); }

// ── HOME ──
function renderHome(){
  // stats
  const logs = DB.logs;
  const week = logs.filter(l=>Date.now()-new Date(l.date)<7*86400000).length;
  const cardio = logs.reduce((a,l)=>a+(+l.cardioMin||0),0);
  document.getElementById('homeStats').innerHTML = `
    <div class="stat-card" style="--c:#e74c3c">
      <div class="stat-label">Тренувань</div>
      <div class="stat-val">${logs.length}<span class="stat-unit">раз</span></div>
    </div>
    <div class="stat-card" style="--c:#f39c12">
      <div class="stat-label">Тижень</div>
      <div class="stat-val">${week}<span class="stat-unit">раз</span></div>
    </div>
    <div class="stat-card" style="--c:#2980b9">
      <div class="stat-label">Кардіо</div>
      <div class="stat-val">${cardio}<span class="stat-unit">хв</span></div>
    </div>`;

  // days
  let html = '';
  PLAN.forEach(d=>{
    const last = [...logs].reverse().find(l=>l.dayId===d.id);
    const lastTxt = last ? `Останнє: ${fmt(last.date)}` : 'Ще не тренувався';
    html += `<div class="day-card" style="--c:${d.color}22;border-left-color:${d.color};border-color:${d.color}33" onclick="startLog(${d.id})">
      <div class="day-badge" style="background:${hex2rgba(d.color,.13)};border:1px solid ${hex2rgba(d.color,.33)};color:${d.color}">${d.label}</div>
      <div class="day-info"><div class="day-name">${d.focus}</div><div class="day-last">${lastTxt}</div></div>
      <div class="day-arrow" style="color:${d.color}">▶</div>
    </div>`;
  });
  document.getElementById('dayList').innerHTML = html;

  // weight
  const w = DB.bw||86;
  document.getElementById('weightInput').value = w;
  const pct = Math.min(100,Math.max(0,((86-w)/6)*100));
  const color = w<=80?'#27ae60':'#e74c3c';
  document.getElementById('weightBar').style.width = pct+'%';
  document.getElementById('weightBar').style.background = color;
  document.getElementById('weightStatus').innerHTML = `<span style="color:${color};font-weight:700">${w<=80?'✅ ЦІЛЬ!':'ще '+(w-80).toFixed(1)+' кг до мети'}</span>`;
}

function updateWeight(v){
  DB.bw = +v||86; save(DB);
  const pct = Math.min(100,Math.max(0,((86-DB.bw)/6)*100));
  const color = DB.bw<=80?'#27ae60':'#e74c3c';
  document.getElementById('weightBar').style.width=pct+'%';
  document.getElementById('weightBar').style.background=color;
  document.getElementById('weightStatus').innerHTML=`<span style="color:${color};font-weight:700">${DB.bw<=80?'✅ ЦІЛЬ!':'ще '+(DB.bw-80).toFixed(1)+' кг до мети'}</span>`;
}

// ── LOG ──
let currentForm = null;
function startLog(dayId){
  const day = PLAN.find(d=>d.id===dayId);
  const last = [...DB.logs].reverse().find(l=>l.dayId===dayId);
  currentForm = {
    dayId, dayLabel:day.focus, color:day.color,
    cardioMin:20, notes:'',
    exercises: day.exercises.map((ex,ei)=>({
      name:ex.name,
      sets:[0,1,2].map(si=>{
        const p = last?.exercises?.[ei]?.sets?.[si];
        return {weight:p?.weight??ex.dw, reps:p?.reps??12, done:false};
      })
    }))
  };
  document.getElementById('navTitle').textContent = '💪 '+day.focus;
  renderLog();
  showPage('log');
}

function renderLog(){
  if(!currentForm){return;}
  const f = currentForm;
  let html = '';
  f.exercises.forEach((ex,ei)=>{
    html += `<div class="ex-block">
      <div class="ex-header" style="background:${hex2rgba(f.color,.1)};border-bottom-color:${hex2rgba(f.color,.15)}">
        <div class="ex-num" style="background:${hex2rgba(f.color,.2)};border:1px solid ${hex2rgba(f.color,.4)};color:${f.color}">${ei+1}</div>
        <div class="ex-title">${ex.name}</div>
      </div>
      <div class="sets-area">
        <div class="sets-head"><div>Підх.</div><div style="text-align:center">Вага (кг)</div><div style="text-align:center">Повт.</div><div style="text-align:center">✓</div></div>`;
    ex.sets.forEach((s,si)=>{
      const doneClass = s.done?'completed':'';
      const btnClass = s.done?'active':'';
      const inputBorder = s.done?`border-color:${f.color}66`:'';
      html += `<div class="set-row ${doneClass}" id="sr-${ei}-${si}">
        <div class="set-num">${si+1}</div>
        <input type="number" class="set-input" style="${inputBorder}" value="${s.weight}" oninput="updateSet(${ei},${si},'weight',this.value)">
        <input type="number" class="set-input" style="${inputBorder}" value="${s.reps}" oninput="updateSet(${ei},${si},'reps',this.value)">
        <button class="set-done-btn ${btnClass}" style="--dc:${f.color}" id="db-${ei}-${si}" onclick="toggleDone(${ei},${si})">✓</button>
      </div>`;
    });
    html += '</div></div>';
  });

  html += `<div class="extra-box">
    <div class="extra-label">🏃 Кардіо (хвилин)</div>
    <input type="number" class="cardio-input" value="${f.cardioMin}" oninput="currentForm.cardioMin=this.value">
  </div>
  <div class="extra-box">
    <div class="extra-label">📝 Нотатки</div>
    <textarea class="notes-input" placeholder="Як відчував себе? Що болить? Що покращити..." oninput="currentForm.notes=this.value">${f.notes}</textarea>
  </div>
  <button class="save-btn" style="background:${f.color};box-shadow:0 4px 20px ${hex2rgba(f.color,.3)}" onclick="saveLog()">✅ ЗБЕРЕГТИ ТРЕНУВАННЯ</button>`;

  document.getElementById('logContent').innerHTML = html;
}

function updateSet(ei,si,field,val){
  currentForm.exercises[ei].sets[si][field] = +val||0;
}
function toggleDone(ei,si){
  const s = currentForm.exercises[ei].sets[si];
  s.done = !s.done;
  const row = document.getElementById(`sr-${ei}-${si}`);
  const btn = document.getElementById(`db-${ei}-${si}`);
  row.classList.toggle('completed',s.done);
  btn.classList.toggle('active',s.done);
  const c = currentForm.color;
  const inputs = row.querySelectorAll('.set-input');
  inputs.forEach(inp=>inp.style.borderColor=s.done?c+'66':'');
}

function saveLog(){
  const log = {...currentForm, date:new Date().toISOString(), id:Date.now()};
  DB.logs.push(log); save(DB);
  document.getElementById('logContent').innerHTML = `
    <div class="saved-screen">
      <div class="saved-icon">✅</div>
      <div class="saved-title">ЗБЕРЕЖЕНО!</div>
      <div class="saved-sub">Відмінне тренування!</div>
    </div>`;
  setTimeout(()=>goHome(), 1500);
}

// ── HISTORY ──
function renderHistory(){
  const logs = [...DB.logs].reverse();
  if(!logs.length){
    document.getElementById('histContent').innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Ще немає записів.<br>Почни перше тренування!</div></div>`;
    return;
  }
  let html='';
  logs.forEach(log=>{
    const day = PLAN.find(d=>d.id===log.dayId)||{color:'#555'};
    const vol = (log.exercises||[]).reduce((a,ex)=>a+ex.sets.filter(s=>s.done).reduce((s2,s)=>s2+(s.weight*s.reps),0),0);
    const done = (log.exercises||[]).reduce((a,ex)=>a+ex.sets.filter(s=>s.done).length,0);
    let exHtml = '';
    (log.exercises||[]).forEach(ex=>{
      exHtml+=`<div class="hist-ex-name">${ex.name}</div><div class="hist-sets">`;
      ex.sets.forEach(s=>{
        const col = s.done?day.color:'#555';
        const bg = s.done?hex2rgba(day.color,.13):'#1e1e2e';
        exHtml+=`<span class="hist-set-badge" style="background:${bg};border-color:${hex2rgba(col,.4)};color:${col}">${s.done?s.weight+'кг × '+s.reps:'—'}</span>`;
      });
      exHtml+='</div>';
    });
    const notesHtml = log.notes?`<div class="hist-notes">"${log.notes}"</div>`:'';
    html+=`<div class="hist-card" style="--hc:${day.color};border-left-color:${day.color}">
      <div class="hist-head" onclick="toggleHist('hb-${log.id}','ha-${log.id}')">
        <div><div class="hist-name">${log.dayLabel}</div><div class="hist-meta">${fmt(log.date)} · ${done} підходів · ${log.cardioMin||0} хв кардіо</div></div>
        <div><div class="hist-vol" style="color:${day.color}">${vol?vol+' кг':''}</div><div class="hist-arrow" id="ha-${log.id}">▼</div></div>
      </div>
      <div class="hist-body" id="hb-${log.id}">
        ${exHtml}${notesHtml}
        <button class="del-btn" onclick="delLog(${log.id})">Видалити запис</button>
      </div>
    </div>`;
  });
  document.getElementById('histContent').innerHTML=html;
}
function toggleHist(bodyId,arrowId){
  const b=document.getElementById(bodyId);
  const a=document.getElementById(arrowId);
  const open=b.classList.toggle('open');
  a.textContent=open?'▲':'▼';
}
function delLog(id){
  DB.logs=DB.logs.filter(l=>l.id!==id); save(DB); renderHistory();
}

// ── STATS ──
function renderStats(){
  const logs = DB.logs;
  const totalKg = logs.reduce((a,l)=>(l.exercises||[]).reduce((b,ex)=>b+ex.sets.filter(s=>s.done).reduce((c,s)=>c+(s.weight*s.reps),0),a),0);
  const cardio = logs.reduce((a,l)=>a+(+l.cardioMin||0),0);
  const week = logs.filter(l=>Date.now()-new Date(l.date)<7*86400000).length;
  const bw = DB.bw||86;
  const pct = Math.min(100,Math.max(0,((86-bw)/6)*100));
  const col = bw<=80?'#27ae60':'linear-gradient(90deg,#27ae60,#e74c3c)';

  // pr per exercise
  const pr={};
  logs.forEach(l=>(l.exercises||[]).forEach(ex=>ex.sets.forEach(s=>{
    if(s.done&&s.weight>0&&(!pr[ex.name]||s.weight>pr[ex.name]))pr[ex.name]=s.weight;
  })));
  const prHtml = Object.keys(pr).length
    ? Object.entries(pr).map(([n,w])=>`<div class="pr-row"><span class="pr-name">${n}</span><span class="pr-badge">${w} кг</span></div>`).join('')
    : `<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-text">Після перших тренувань тут<br>з'явиться твій прогрес</div></div>`;

  document.getElementById('statsContent').innerHTML=`
    <div class="stats2-row">
      <div class="stat-card" style="--c:#e74c3c"><div class="stat-label">Тренувань</div><div class="stat-val">${logs.length}<span class="stat-unit">раз</span></div></div>
      <div class="stat-card" style="--c:#f39c12"><div class="stat-label">Об'єм</div><div class="stat-val">${Math.round(totalKg/1000)}<span class="stat-unit">т</span></div></div>
      <div class="stat-card" style="--c:#2980b9"><div class="stat-label">Кардіо</div><div class="stat-val">${cardio}<span class="stat-unit">хв</span></div></div>
      <div class="stat-card" style="--c:#27ae60"><div class="stat-label">Тижень</div><div class="stat-val">${week}<span class="stat-unit">раз</span></div></div>
    </div>
    <div class="weight-box" style="margin-bottom:12px">
      <div class="section-label">Прогрес ваги</div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:6px"><span>86 кг</span><span>80 кг</span></div>
      <div class="progress-bar-bg" style="height:12px;border-radius:6px"><div class="progress-bar-fill" style="width:${pct}%;background:${col};border-radius:6px"></div></div>
      <div style="text-align:center;margin-top:8px;font-size:16px;font-weight:800">${bw} кг <span style="font-size:12px;color:#888;font-weight:400">(${bw<=80?'✅ Ціль!':'залишилось '+(bw-80).toFixed(1)+' кг'})</span></div>
    </div>
    <div class="weight-box"><div class="section-label">Максимальна вага по вправах</div>${prHtml}</div>`;
}

// ── TELEGRAM INIT ──
if(window.Telegram?.WebApp){
  const tg = window.Telegram.WebApp;
  tg.ready();
  tg.expand();
  // adapt colors to Telegram theme
  document.body.style.background = tg.colorScheme==='light'?'#f5f5f5':'#0d0d14';
}
// ── INIT ──
renderHome();
</script>
